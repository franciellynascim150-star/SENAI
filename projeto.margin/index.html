<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>
     <h1>✨ Margin e Padding — Estilo Criadora</h1>

    <div class="caixa1">
        <h3>📌 Padding: 30px — espaço interno</h3>
        <p>O bloco rosa cresceu por dentro.</p>
    </div>

    <div class="caixa2">
        <h3>📱 Margin: 30px — espaço externo</h3>
        <p>O bloco roxo se afastou dos outros.</p>
    </div>

    <div class="caixa3">
        <h3>🌟 Margin: 20px + Padding: 20px</h3>
        <p>Margin afasta por fora. Padding cresce por dentro.</p>
    </div>

</body>
</html>
